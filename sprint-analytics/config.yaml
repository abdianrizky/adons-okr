# Old H2 2025 sprints (archived)
revenue_growth_sprints: []

# Completion status criteria
completion_status:
  # Task is considered complete if status contains this string (case-insensitive)
  keyword: "deployed"
  # Examples of matching statuses: "8.0 deployed", "Deployed", "deployed to prod"

# Cache settings
cache:
  enabled: true
  ttl_hours: 24
  directory: "data/cache"

# Rate limiting (ClickUp API limits: 100 req/min)
rate_limit:
  requests_per_minute: 80  # Conservative limit
  burst_size: 10

# Retry settings
retry:
  max_attempts: 3
  initial_wait_seconds: 1
  max_wait_seconds: 10

# Output settings
output:
  directory: "output"
  charts:
    dpi: 300
    velocity_chart: "sprint_velocity_chart.png"
    burndown_chart: "sprint_burndown_chart.png"
    delivery_rate_chart: "sprint_delivery_rate_chart.png"
  reports:
    json: "sprint_metrics.json"
    csv: "sprint_metrics.csv"
    markdown: "sprint_summary.md"
